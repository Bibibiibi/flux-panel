name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Backend
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./springboot-backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/bibibiibi/springboot-backend:latest

      # Build and push Frontend
      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./vite-frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/bibibiibi/vite-frontend:latest

  build-go-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false # 禁用缓存避免复杂问题

      - name: Build Go binaries
        run: |
          cd go-gost
          
          # Build for linux/amd64
          GOOS=linux GOARCH=amd64 go build -o ../gost-amd64 .
          
          # Build for linux/arm64
          GOOS=linux GOARCH=arm64 go build -o ../gost-arm64 .

      - name: Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          files: |
            gost-amd64
            gost-arm64
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
